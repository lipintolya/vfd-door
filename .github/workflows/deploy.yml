name: Deploy to Beget VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build
      env:
        YANDEX_CAPTCHA_SITE_KEY: ${{ secrets.YANDEX_CAPTCHA_SITE_KEY }}
        YANDEX_CAPTCHA_SECRET_KEY: ${{ secrets.YANDEX_CAPTCHA_SECRET_KEY }}
        VITE_FORM_SECRET_TOKEN: ${{ secrets.VITE_FORM_SECRET_TOKEN }}

    - name: Verify build
      run: |
        echo "Build contents:"
        ls -la dist/

    - name: Deploy via SSH
      uses: easingthemes/ssh-deploy@v4.1.2
      with:
        SSH_PRIVATE_KEY: ${{ secrets.BEGET_SSH_KEY }}
        REMOTE_HOST: ${{ secrets.BEGET_HOST }}
        REMOTE_USER: ${{ secrets.BEGET_USER }}
        REMOTE_PORT: ${{ secrets.BEGET_PORT }}
        SOURCE: dist/
        TARGET: ${{ secrets.BEGET_TARGET_PATH }}
        ARGS: '-rltgoDzvO --delete'

    - name: Success notification
      run: echo "✅ Deployed to https://vfd74.ru"
