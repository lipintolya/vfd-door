name: Deploy to Beget VPS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build
      env:
        YANDEX_CAPTCHA_SITE_KEY: ${{ secrets.YANDEX_CAPTCHA_SITE_KEY }}
        YANDEX_CAPTCHA_SECRET_KEY: ${{ secrets.YANDEX_CAPTCHA_SECRET_KEY }}
        VITE_FORM_SECRET_TOKEN: ${{ secrets.VITE_FORM_SECRET_TOKEN }}

    - name: Deploy to Beget VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.BEGET_HOST }}
        username: ${{ secrets.BEGET_USER }}
        port: ${{ secrets.BEGET_PORT }}
        key: ${{ secrets.BEGET_SSH_KEY }}
        script: |
          cd /var/www/vfd-door/data
          rm -rf *
          cp -r /home/runner/work/vfd-door/vfd-door/dist/* .
          chown -R www-data:www-data /var/www/vfd-door/data
          systemctl reload nginx

    - name: Success
      run: echo "✅ Deployed to https://vfd74.ru"
