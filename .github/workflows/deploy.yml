name: Deploy to Beget VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build
      env:
        YANDEX_CAPTCHA_SITE_KEY: ${{ secrets.YANDEX_CAPTCHA_SITE_KEY }}
        YANDEX_CAPTCHA_SECRET_KEY: ${{ secrets.YANDEX_CAPTCHA_SECRET_KEY }}
        VITE_FORM_SECRET_TOKEN: ${{ secrets.VITE_FORM_SECRET_TOKEN }}

    - name: Show build info
      run: |
        echo "=== Build completed ==="
        ls -la dist/

    - name: Deploy via rsync
      uses: burnett01/rsync-deployments@7.0.2
      with:
        switches: -avzr --delete
        path: dist/
        remote_path: /var/www/vfd-door/data/
        remote_host: ${{ secrets.BEGET_HOST }}
        remote_user: ${{ secrets.BEGET_USER }}
        remote_port: ${{ secrets.BEGET_PORT }}
        remote_key: ${{ secrets.BEGET_SSH_KEY }}

    - name: Done
      run: echo "✅ Deployed to https://vfd74.ru"
