name: Deploy to Beget VPS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build project
      run: npm run build
      env:
        YANDEX_CAPTCHA_SITE_KEY: ${{ secrets.YANDEX_CAPTCHA_SITE_KEY }}
        YANDEX_CAPTCHA_SECRET_KEY: ${{ secrets.YANDEX_CAPTCHA_SECRET_KEY }}
        VITE_FORM_SECRET_TOKEN: ${{ secrets.VITE_FORM_SECRET_TOKEN }}
        
    - name: Generate pre-rendered pages (SEO)
      run: npm run prerender
      
    - name: Generate sitemap.xml
      run: npm run sitemap
      
    - name: Verify build
      run: |
        echo "📊 Build stats:"
        ls -lh dist/
        echo "📄 Pre-rendered pages:"
        find dist -name "index.html" -exec ls -lh {} \;
        
    - name: Deploy to Beget via SSH
      uses: easingthemes/ssh-deploy@v4
      with:
        SSH_PRIVATE_KEY: ${{ secrets.BEGET_SSH_KEY }}
        SSH_PRIVATE_KEY_PASSPHRASE: ${{ secrets.BEGET_SSH_PASSPHRASE }}
        REMOTE_HOST: ${{ secrets.BEGET_HOST }}
        REMOTE_USER: ${{ secrets.BEGET_USER }}
        REMOTE_PORT: ${{ secrets.BEGET_PORT }}
        SOURCE: ./dist/
        TARGET: ${{ secrets.BEGET_TARGET_PATH }}
        EXCLUDE: '.git*, .env*, node_modules'
        ARGS: '-rltgoDzvO --delete'
        SSH_KNOWN_HOSTS: false
        
    - name: Deployment complete
      run: |
        echo "✅ Deploy completed!"
        echo "🌐 Site: https://vfd74.ru"
        echo "📝 Sitemap: https://vfd74.ru/sitemap.xml"
